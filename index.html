<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grok-remote</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2280%22 font-size=%2280%22>·</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" id="brand-link" href="#/">
        <span class="brand-dot"></span>
        <span class="brand-mark" id="topbar-mark"></span>
        <span class="brand-name">grok-remote</span>
        <span class="brand-version" id="brand-version">v0.1</span>
      </a>
      <div class="topbar-right">
        <div class="status" id="status">
          <span class="status-pill status-pill--idle" id="status-pill">·</span>
          <span class="status-text" id="status-text">probing tailnet</span>
        </div>
        <button class="topbar-btn" id="open-settings" title="settings">settings</button>
      </div>
    </header>

    <section class="intro" id="intro" aria-hidden="false">
      <pre class="figlet" id="figlet"></pre>
      <p class="subtitle">your grok agent, on your tailnet</p>
    </section>

    <main id="app" class="app"></main>

    <footer class="bottombar">
      <span>not affiliated with xAI, grok, or Tailscale</span>
      <span class="sep">·</span>
      <a href="https://x.com/daniel_farinax" target="_blank" rel="noopener">@daniel_farinax</a>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
